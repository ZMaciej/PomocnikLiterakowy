<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Modak:wght@100;400;500;600&display=swap" rel="stylesheet">
    <title>Pomocnik Literakowy</title>
    <link rel="icon" href="pomocnikLogo.svg">
    <link rel="stylesheet" href="style/main.css">
    <!-- links to icons refresh, arrow_forward,  moon, sun-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_forward,moon,refresh,sun" />
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.0.3/tsparticles.confetti.bundle.min.js"></script>
</head>
<body>
    <div id="header-panel" style="width: 100%;">
        <div id="started-game-controls" class="hidden">
            <span id="timer-value">00:00</span>
            <button id="stop-game">❌</button>
        </div>
        <button id="game-of-the-day" class="hidden">gra dnia</button>
        <div id="title">
          <span id="title-main">Pomocnik Literakowy</span>
          <div class="title-kids hidden">
            <span class="kids-letter" style="color: var(--tile-red); -webkit-text-stroke: 0.7px var(--tile-red-border);">
              k</span>
            <span class="kids-letter" style="color: var(--tile-green); -webkit-text-stroke: 0.7px var(--tile-green-border);">
              i</span>
            <span class="kids-letter" style="color: var(--tile-blue); -webkit-text-stroke: 0.7px var(--tile-blue-border);">
              d</span>
            <span class="kids-letter" style="color: var(--tile-yellow); -webkit-text-stroke: 0.7px var(--tile-yellow-border);">
              s</span>
          </div>
        </div>
        <div id="points-panel" class="hidden">
            <span id="recent-difference">0</span>
            <span id="points">0</span>
        </div>
    </div>

    <nav>
        <button id="btn-game">Ułóż słowo</button>
        <button id="btn-check">Istnieje czy nic?</button>
    </nav>

    <!-- loading overlay shown during initial dictionary load -->
    <div id="loading-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.95); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999;">
        <h2>Wczytywanie słownika...</h2>
        <progress id="loading-progress" max="100" value="0" style="width:300px; margin:1rem 0;"></progress>
        <div id="loadingAnimation" aria-label="loading animation" role="img">
          <span class="loading-square loading-square-yellow"></span>
          <span class="loading-square loading-square-green"></span>
          <span class="loading-square loading-square-blue"></span>
          <span class="loading-square loading-square-red"></span>
        </div>
        <p id="loading-status">Wczytywanie słownika...</p>
    </div>

    <!-- sekcje ukrywane/pokazywane przez JS -->

    <section id="check-section" class="page-section" style="display:none;">
        <input type="text" id="input-text" placeholder="Wprowadź litery...">
        <div id="output" style="min-width: 17rem;"></div>
        <small style="font-size: 0.6rem; display:block; margin-top:0.5rem;">Hint: Blank = "?".</small>
    </section>

    <section id="game-section" class="page-section" style="display:none;">
      <div class="controls">
        <div id="letter-count-button" style="display:inline-block; margin-left:0.5rem;">
            Liczba liter:
            <button id="button-6">6</button>
            <button class="chosen" id="button-7">7</button>
            <button id="button-8">8</button>
            <button id="button-9">9</button>
        </div>
        <button id="next-button">
            <div id="next">
                <span class="material-symbols-outlined">arrow_forward</span>
                next
            </div>
        </button>
      </div>
      <div id="letter-display"></div>
      <p id="possible-count">Możliwych słów: <span id="solution-count">0</span></p>
      <div class="controls">
          <button id="check-button">Sprawdź</button>
          <button id="shuffle-button">
              <div id="mix">
                  <span class="material-symbols-outlined">refresh</span>
                  mixuj
              </div>
          </button>
      </div>
      <div id="correct-section">
          <p style="font-size:small;">Prawidłowe hasła:</p>
          <div id="guess-list"></div>
      </div>
      <button id="give-up-button" style="position: fixed; bottom: 1rem; left: 1rem;">poddaję się - pokaż wszystko</button>
    </section>

    <div id="game-of-day-overlay" class="hidden">
        <div id="game-of-day-modal">
          <div style="display: flex; flex-direction: column; align-items: center;">
            <span style="font-size: 1.5rem; font-weight: bold;">Koniec gry dnia</span>
            <span id="game-of-day-date" style="font-size: 0.7rem;"></span>
            <div class="title-kids hidden">
              <span class="kids-letter" style="color: var(--tile-red); -webkit-text-stroke: 0.7px var(--tile-red-border);">
                k</span>
              <span class="kids-letter" style="color: var(--tile-green); -webkit-text-stroke: 0.7px var(--tile-green-border);">
                i</span>
              <span class="kids-letter" style="color: var(--tile-blue); -webkit-text-stroke: 0.7px var(--tile-blue-border);">
                d</span>
              <span class="kids-letter" style="color: var(--tile-yellow); -webkit-text-stroke: 0.7px var(--tile-yellow-border);">
                s</span>
            </div>
          </div>
          <p>Twój wynik: <strong><span id="game-of-day-score">0</span> pkt</strong></p>
          <p style="font-size: small; margin-top: 0.8rem;">Słowa:</p>
          <p id="game-of-day-words-list" style="word-break: break-word;"></p>
          <button id="game-of-day-return">Wróć do normalnego trybu</button>
        </div>
    </div>
    <div id="congratulations-overlay" class="hidden">
        <div id="congratulations-modal">
            <span style="font-size: 1.5rem; font-weight: bold;">Gratulacje!</span>
            <!-- gif -->
            <img src="gifs/chinchilla-rodent.gif" alt="Gratulacje" style="width: 50%; max-width: 100%; margin: 1rem;">
            <p>Solidnie napierdalasz! Essa 🤘</p>
            <img src="gifs/congrats-cutecongrats.gif" alt="Gratulacje" style="width: 50%; max-width: 100%; margin: 1rem;">
            <button id="congratulations-return">Graj dalej</button>
        </div>
    </div>

    <script src="script/LiterakiData.js" defer></script>
    <script src="script/SlownikJezykaPolskiego.js" defer></script>
    <script src="script/AnagramMapHandler.js" defer></script>
    <script src="script/FileHandler.js" defer></script>
    <script src="script/RandomControl.js" defer></script>
    <script src="script/main.js" defer></script>
</body>
</html>
