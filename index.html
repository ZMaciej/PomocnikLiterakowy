<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Pomocnik Literakowy</title>
    <link rel="icon" href="pomocnikLogo.svg">
    <link rel="stylesheet" href="style/main.css">
    <!-- links to icons refresh, arrow_forward,  moon, sun-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_forward,moon,refresh,sun" />
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.0.3/tsparticles.confetti.bundle.min.js"></script>
</head>
<body>
    <div id="header-panel">
            <div id="started-game-controls" class="hidden">
        <span id="timer-value">00:00</span>
        <button id="stop-game">🛑</button>
      </div>
      <button id="game-of-the-day" class="hidden">gra dnia</button>
      <h3>Pomocnik Literakowy</h3>
        <div id="points-panel" class="hidden">
          <span id="recent-difference">0</span>
          <span id="points">0</span>
      </div>
    </div>

    <nav>
        <button id="btn-game">Ułóż słowo</button>
        <button id="btn-check">Istnieje czy nic?</button>
    </nav>

    <!-- loading overlay shown during initial dictionary load -->
    <div id="loading-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.95); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999;">
        <h2>Wczytywanie słownika...</h2>
        <progress id="loadingProgress" max="100" value="0" style="width:300px; margin:1rem 0;"></progress>
        <p id="loadingStatus">Sprawdzanie pamięci podręcznej...</p>
    </div>

    <!-- sekcje ukrywane/pokazywane przez JS -->

    <section id="check-section" class="page-section" style="display:none;">
        <!-- treść z poprzedniej czy-istnieje-slowo.html -->
        <small style="display:block; margin-bottom:0.5rem;">Hint: blanki reprezentowane są poprzez znak zapytania "?".</small>
        <input type="text" id="inputText" placeholder="Wprowadź litery...">
        <div id="output"></div>
    </section>

    <section id="game-section" class="page-section" style="display:none;">
      <div class="controls">
        <div id="letterCountButtons" style="display:inline-block; margin-left:0.5rem;">
            Liczba liter:
            <button id="Btn6">6</button>
            <button class="chosen" id="Btn7">7</button>
            <button id="Btn8">8</button>
            <button id="Btn9">9</button>
        </div>
        <button id="nextBtn">
            <div id="next">
                <span class="material-symbols-outlined">arrow_forward</span>
                next
            </div>
        </button>
      </div>
      <div id="letterDisplay"></div>
        <p id="possibleCount">Możliwych słów: <span id="solutionCount">0</span></p>
        <div class="controls">
            <button id="checkBtn">Sprawdź</button>
            <button id="shuffleBtn">
                <div id="mix">
                    <span class="material-symbols-outlined">refresh</span>
                    mixuj
                </div>
            </button>
        </div>
        <div id="correctSection">
            <p style="font-size:small;">Prawidłowe hasła:</p>
            <div id="guessList"></div>
        </div>
        <button id="giveUpBtn" style="position: fixed; bottom: 1rem; left: 1rem;">poddaję się - pokaż wszystko</button>
    </section>

    <div id="game-of-day-overlay" class="hidden">
        <div id="game-of-day-modal">
            <h2>Koniec gry dnia</h2>
            <p>Twój wynik: <strong><span id="game-of-day-score">0</span> pkt</strong></p>
            <p style="font-size: small; margin-top: 0.8rem;">Słowa:</p>
            <p id="game-of-day-words-list" style="word-break: break-word;"></p>
            <button id="game-of-day-return">Wróć do normalnego trybu</button>
        </div>
    </div>

    <script src="script/main.js" defer></script>
    <script src="script/LiterakiData.js" defer></script>
</body>
</html>
